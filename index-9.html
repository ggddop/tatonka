<!doctype html>
<html lang="ru" data-theme="milk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f6d7de">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TaToNkA</title>
<style>
/* ==================== ДИЗАЙН-СИСТЕМА ==================== */
:root{
  --bg-h:32; --bg-s:42%; --bg-l:97.5%;
  --surface-l:100%; --surface-s:40%;
  --text:#4b3f47; --muted:#a89aa2; --border:rgba(74,58,72,.08);
  --accent-h:342; --accent-s:64%; --accent-l:76%; --accent-ink-l:50%;
  --lav-h:262; --sage-h:145; --peach-h:24;
  --tint-s:60%; --tint-l:93%; --icon-s:46%; --icon-l:54%;
  --ring-l:70%; --ring-s:62%;
  --shadow:0 14px 34px -16px rgba(90,55,75,.20), 0 3px 10px -4px rgba(90,55,75,.08);
  --shadow-sm:0 6px 16px -8px rgba(90,55,75,.20);
  --radius:26px; --radius-sm:18px; --radius-xs:14px;
  --ease:cubic-bezier(.22,1,.36,1);
}
[data-theme="sakura"]{ --bg-h:348; --bg-s:52%; --bg-l:97.5%; --accent-h:338; --accent-s:72%; --accent-l:78%; --accent-ink-l:52%; }
[data-theme="lavender"]{ --bg-h:262; --bg-s:44%; --bg-l:97.5%; --accent-h:266; --accent-s:48%; --accent-l:76%; --accent-ink-l:54%; }
[data-theme="peach"]{ --bg-h:24; --bg-s:64%; --bg-l:97.5%; --accent-h:16; --accent-s:78%; --accent-l:76%; --accent-ink-l:50%; }
[data-theme="sage"]{ --bg-h:132; --bg-s:26%; --bg-l:97.5%; --accent-h:146; --accent-s:36%; --accent-l:64%; --accent-ink-l:34%; }
/* тёмные темы */
[data-theme="mocha"]{ --bg-h:26; --bg-s:22%; --bg-l:14%; --surface-l:19%; --surface-s:16%; --text:#efe3da; --muted:#a99a8e; --border:rgba(255,255,255,.09); --accent-h:26; --accent-s:46%; --accent-l:64%; --accent-ink-l:74%; --tint-l:24%; --tint-s:34%; --icon-l:70%; --icon-s:44%; --ring-l:62%; --shadow:0 16px 40px -18px rgba(0,0,0,.6); --shadow-sm:0 8px 20px -10px rgba(0,0,0,.55); }
[data-theme="night"]{ --bg-h:258; --bg-s:26%; --bg-l:12%; --surface-l:17%; --surface-s:20%; --text:#ece7f4; --muted:#9a90ab; --border:rgba(255,255,255,.09); --accent-h:266; --accent-s:56%; --accent-l:72%; --accent-ink-l:80%; --tint-l:23%; --tint-s:36%; --icon-l:72%; --icon-s:48%; --ring-l:66%; --shadow:0 16px 40px -18px rgba(0,0,0,.65); --shadow-sm:0 8px 20px -10px rgba(0,0,0,.6); }
[data-theme="sunset"]{ --bg-h:340; --bg-s:42%; --bg-l:15%; --surface-l:20%; --surface-s:30%; --text:#f6e6df; --muted:#c39a9a; --border:rgba(255,255,255,.10); --accent-h:20; --accent-s:82%; --accent-l:68%; --accent-ink-l:80%; --tint-l:25%; --tint-s:44%; --icon-l:74%; --icon-s:60%; --ring-l:66%; --shadow:0 16px 40px -18px rgba(0,0,0,.6); --shadow-sm:0 8px 20px -10px rgba(0,0,0,.5); }
/* переключатель тёмного режима для светлых тем */
html.dark:not([data-theme="mocha"]):not([data-theme="night"]):not([data-theme="sunset"]){
  --bg-l:13%; --surface-l:18%; --surface-s:18%; --text:#efe7ec; --muted:#9a8f97; --border:rgba(255,255,255,.09);
  --accent-ink-l:78%; --tint-l:23%; --tint-s:34%; --icon-l:70%; --icon-s:46%; --ring-l:64%;
  --shadow:0 16px 40px -18px rgba(0,0,0,.6); --shadow-sm:0 8px 20px -10px rgba(0,0,0,.55);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  background:hsl(var(--bg-h) var(--bg-s) var(--bg-l));
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  line-height:1.45;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text)}
::-webkit-scrollbar{width:0;height:0}

.accent{color:hsl(var(--accent-h) var(--accent-s) var(--accent-ink-l))}
.bg-accent{background:hsl(var(--accent-h) var(--accent-s) var(--accent-l))}

/* ==================== ЛЭЙАУТ ==================== */
#app{max-width:520px;margin:0 auto;min-height:100%;position:relative}
#main{padding:calc(env(safe-area-inset-top) + 8px) 18px 120px}
.screen{animation:fade .45s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.head{display:flex;align-items:center;justify-content:space-between;margin:10px 2px 20px}
.head h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:0}
.sub{color:var(--muted);font-size:14px;font-weight:600}
.iconbtn{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:hsl(var(--bg-h) 30% var(--surface-l));box-shadow:var(--shadow-sm);transition:transform .2s var(--ease)}
.iconbtn:active{transform:scale(.9)}

/* ==================== КАРТОЧКИ ==================== */
.card{background:hsl(var(--bg-h) var(--surface-s) var(--surface-l));border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tile{
  --h:342; position:relative; border-radius:var(--radius);padding:16px 16px 18px;
  background:hsl(var(--h) var(--tint-s) var(--tint-l));
  box-shadow:var(--shadow-sm); overflow:hidden; text-align:left;
  transition:transform .22s var(--ease); min-height:118px; display:flex;flex-direction:column;justify-content:space-between;
  animation:pop .5s var(--ease) both;
}
.tile:active{transform:scale(.955)}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.tile .ic{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:hsl(var(--h) 60% 100% / .55);color:hsl(var(--h) var(--icon-s) var(--icon-l))}
html.dark .tile .ic,[data-theme="mocha"] .tile .ic,[data-theme="night"] .tile .ic,[data-theme="sunset"] .tile .ic{background:hsl(var(--h) 40% 100% / .10)}
.tile .lbl{font-weight:700;font-size:15px;margin-top:10px}
.tile .val{font-size:13px;color:hsl(var(--h) var(--icon-s) var(--icon-l));font-weight:800;margin-top:2px}
.tile.done::after{content:"";position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:hsl(var(--h) var(--icon-s) var(--icon-l));-webkit-mask:var(--check) center/13px no-repeat;mask:var(--check) center/13px no-repeat}

.t-water{--h:202}.t-steps{--h:150}.t-workout{--h:8}.t-food{--h:32}.t-weight{--h:262}
.t-mood{--h:44}.t-sleep{--h:244}.t-photo{--h:322}.t-read{--h:176}.t-care{--h:300}.t-diary{--h:214}

/* ==================== КОЛЬЦО ПРОГРЕССА (сигнатура) ==================== */
.hero{position:relative;display:flex;flex-direction:column;align-items:center;margin:4px 0 22px}
.ringwrap{position:relative;width:210px;height:210px;display:grid;place-items:center}
.ringwrap svg{transform:rotate(-90deg)}
.ringglow{position:absolute;inset:24px;border-radius:50%;filter:blur(26px);opacity:.5;
  background:conic-gradient(from 0deg,hsl(var(--accent-h) 70% 74%),hsl(var(--lav-h) 55% 76%),hsl(var(--sage-h) 45% 70%),hsl(var(--accent-h) 70% 74%));
  animation:breathe 5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.38;transform:scale(.97)}50%{opacity:.6;transform:scale(1.03)}}
.ringtext{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ringtext .pct{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1}
.ringtext .day{font-size:13px;font-weight:700;color:var(--muted);margin-top:6px}
.greet{font-size:22px;font-weight:800;letter-spacing:-.4px;text-align:center}
.greet small{display:block;color:var(--muted);font-size:14px;font-weight:600;margin-top:2px}

/* сводка */
.summary{display:flex;gap:10px;margin:2px 0 20px}
.summary .s{flex:1;background:hsl(var(--bg-h) var(--surface-s) var(--surface-l));border-radius:var(--radius-sm);padding:12px;text-align:center;box-shadow:var(--shadow-sm)}
.summary .s b{display:block;font-size:19px;font-weight:800}
.summary .s span{font-size:11px;color:var(--muted);font-weight:600}

.section-t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:24px 4px 12px}

/* ==================== КНОПКИ ==================== */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:18px;font-weight:800;font-size:16px;
  background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));color:#3a2530;box-shadow:0 10px 24px -10px hsl(var(--accent-h) 60% 55% / .6);transition:transform .18s var(--ease)}
html.dark .btn,[data-theme="mocha"] .btn,[data-theme="night"] .btn,[data-theme="sunset"] .btn{color:#241820}
.btn:active{transform:scale(.97)}
.btn.ghost{background:hsl(var(--bg-h) 30% var(--surface-l));color:var(--text);box-shadow:var(--shadow-sm)}
.btn.sm{padding:11px 16px;font-size:14px;width:auto;border-radius:14px}
.chip{padding:9px 15px;border-radius:14px;background:hsl(var(--bg-h) 30% var(--surface-l));box-shadow:var(--shadow-sm);font-weight:700;font-size:14px;transition:transform .15s}
.chip:active{transform:scale(.93)}
.chip.on{background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));color:#3a2530}
.pillrow{display:flex;gap:9px;flex-wrap:wrap}

/* ==================== НИЖНЕЕ МЕНЮ ==================== */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;pointer-events:none}
.navbar{pointer-events:auto;display:flex;gap:4px;margin:0 12px 14px;padding:8px;border-radius:26px;
  background:hsl(var(--bg-h) 40% var(--surface-l) / .82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 -2px 30px -8px rgba(90,55,75,.28),0 8px 24px -10px rgba(90,55,75,.2);width:calc(100% - 24px);max-width:496px;justify-content:space-between;
  padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border-radius:18px;color:var(--muted);font-size:10px;font-weight:700;transition:color .2s,background .2s}
.navb svg{width:23px;height:23px}
.navb.on{color:hsl(var(--accent-h) var(--accent-s) var(--accent-ink-l));background:hsl(var(--accent-h) var(--accent-s) var(--accent-l) / .16)}
.navb:active{transform:scale(.9)}

/* ==================== ШТОРКА / SHEET ==================== */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(40,25,35,.42);opacity:0;transition:opacity .3s;backdrop-filter:blur(2px)}
.scrim.show{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:520px;margin:0 auto;
  background:hsl(var(--bg-h) var(--bg-s) calc(var(--bg-l) + 1%));border-radius:30px 30px 0 0;
  padding:8px 20px calc(28px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .38s var(--ease);box-shadow:0 -10px 40px -10px rgba(40,25,35,.4)}
.sheet.show{transform:none}
.grab{width:44px;height:5px;border-radius:3px;background:var(--border);margin:8px auto 14px}
.sheet h2{font-size:22px;font-weight:800;margin:4px 2px 4px;letter-spacing:-.4px}
.sheet .desc{color:var(--muted);font-size:14px;font-weight:600;margin:0 2px 18px}

/* поля */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin:0 2px 7px}
.inp{width:100%;padding:15px 16px;border-radius:16px;background:hsl(var(--bg-h) 26% var(--surface-l));border:1.5px solid var(--border);outline:none;font-weight:600;transition:border .2s}
.inp:focus{border-color:hsl(var(--accent-h) var(--accent-s) var(--accent-l))}
textarea.inp{resize:vertical;min-height:90px;line-height:1.5}
select.inp{appearance:none;-webkit-appearance:none;background-image:var(--chev);background-repeat:no-repeat;background-position:right 16px center;background-size:16px}

/* большой счётчик */
.counter{display:flex;align-items:center;justify-content:center;gap:22px;margin:10px 0}
.counter .cbtn{width:60px;height:60px;border-radius:22px;display:grid;place-items:center;background:hsl(var(--bg-h) 30% var(--surface-l));box-shadow:var(--shadow-sm);font-size:30px;font-weight:700;transition:transform .15s}
.counter .cbtn:active{transform:scale(.88)}
.counter .cval{font-size:56px;font-weight:800;letter-spacing:-2px;min-width:96px;text-align:center}
.counter .cval small{display:block;font-size:13px;color:var(--muted);font-weight:700;letter-spacing:0}

/* эмодзи настроения */
.moods{display:flex;justify-content:space-between;gap:6px;margin:6px 0 4px}
.moods button{font-size:38px;padding:8px;border-radius:18px;transition:transform .2s,background .2s;filter:grayscale(.5);opacity:.6}
.moods button.on{filter:none;opacity:1;transform:scale(1.18);background:hsl(var(--accent-h) var(--accent-s) var(--accent-l) / .2)}

/* прогресс-бар */
.bar{height:12px;border-radius:8px;background:var(--border);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:8px;background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));transition:width .6s var(--ease)}

/* список */
.row{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .rl{font-weight:700}.row .rr{color:var(--muted);font-weight:700;font-size:14px}

/* чек */
.check{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:hsl(var(--bg-h) 26% var(--surface-l));margin-bottom:10px;box-shadow:var(--shadow-sm);transition:transform .15s}
.check:active{transform:scale(.98)}
.check .box{width:26px;height:26px;border-radius:9px;border:2px solid var(--border);flex:none;display:grid;place-items:center;transition:.2s}
.check.on .box{background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));border-color:transparent}
.check.on .box::after{content:"";width:14px;height:14px;background:#3a2530;-webkit-mask:var(--check) center/14px no-repeat;mask:var(--check) center/14px no-repeat}
.check .ctxt{font-weight:700;flex:1}.check.on .ctxt{opacity:.65}

/* чипы-темы */
.themegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.themecard{border-radius:18px;padding:14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;font-weight:800;position:relative;overflow:hidden;transition:transform .15s}
.themecard:active{transform:scale(.96)}
.themecard .dot{width:34px;height:34px;border-radius:12px;flex:none;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
.themecard.on::after{content:"";position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:hsl(var(--accent-h) 60% 55%);-webkit-mask:var(--check) center/12px no-repeat;mask:var(--check) center/12px no-repeat}

/* достижения */
.ach{display:flex;align-items:center;gap:14px;padding:14px;border-radius:18px;background:hsl(var(--bg-h) var(--surface-s) var(--surface-l));box-shadow:var(--shadow-sm);margin-bottom:10px}
.ach .em{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:26px;background:hsl(var(--accent-h) var(--accent-s) var(--accent-l) / .18);flex:none}
.ach.locked{opacity:.5;filter:grayscale(.7)}
.ach .at{font-weight:800}.ach .ad{font-size:12px;color:var(--muted);font-weight:600}

/* пустое состояние */
.empty{text-align:center;color:var(--muted);padding:40px 20px}
.empty .e-em{font-size:46px;margin-bottom:10px}
.empty b{color:var(--text);display:block;font-size:16px;margin-bottom:4px}

/* тосты */
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:hsl(var(--accent-h) 40% 22%);color:#fff;padding:13px 20px;border-radius:16px;font-weight:700;font-size:14px;
  box-shadow:0 12px 30px -8px rgba(0,0,0,.4);opacity:0;transition:.35s var(--ease);pointer-events:none;max-width:88%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%)}

/* чат TaTo */
.chat{display:flex;flex-direction:column;gap:12px;padding:6px 0 10px}
.msg{max-width:82%;padding:13px 16px;border-radius:20px;font-weight:600;line-height:1.5;font-size:15px;animation:pop .4s var(--ease) both}
.msg.tato{align-self:flex-start;background:hsl(var(--bg-h) var(--surface-s) var(--surface-l));border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
.msg.me{align-self:flex-end;background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));color:#3a2530;border-bottom-right-radius:6px}
.chatbar{position:fixed;left:0;right:0;bottom:calc(78px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto;padding:0 18px;display:flex;gap:10px;z-index:30}
.chatbar input{flex:1;padding:14px 18px;border-radius:22px;background:hsl(var(--bg-h) 40% var(--surface-l));border:1.5px solid var(--border);box-shadow:var(--shadow);outline:none;font-weight:600}
.chatbar .send{width:50px;height:50px;border-radius:50%;flex:none;background:hsl(var(--accent-h) var(--accent-s) var(--accent-l));display:grid;place-items:center;box-shadow:var(--shadow)}

/* фото-сетка */
.photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.photos .ph{aspect-ratio:1;border-radius:16px;overflow:hidden;position:relative;background:var(--border)}
.photos .ph img{width:100%;height:100%;object-fit:cover;display:block}
.photos .ph .d{position:absolute;left:6px;bottom:6px;font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.compare{display:flex;gap:8px;margin-top:12px}
.compare>div{flex:1;text-align:center}
.compare img{width:100%;border-radius:16px;aspect-ratio:3/4;object-fit:cover}
.compare span{font-size:12px;font-weight:800;color:var(--muted)}

/* онбординг */
.ob{min-height:100vh;display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top) + 30px) 24px calc(env(safe-area-inset-bottom) + 24px);max-width:520px;margin:0 auto}
.logo{font-size:40px;font-weight:800;letter-spacing:-1.5px;text-align:center}
.logo b{background:linear-gradient(120deg,hsl(var(--accent-h) 66% 68%),hsl(var(--lav-h) 55% 70%),hsl(var(--sage-h) 45% 62%));-webkit-background-clip:text;background-clip:text;color:transparent}
.mark{width:96px;height:96px;margin:0 auto;border-radius:30px;display:grid;place-items:center;box-shadow:0 20px 44px -16px hsl(var(--accent-h) 60% 60% / .6);
  background:linear-gradient(140deg,hsl(var(--accent-h) 70% 80%),hsl(var(--lav-h) 55% 78%),hsl(var(--sage-h) 42% 74%))}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.05ms!important}}

/* ==================== ОНБОРДИНГ: тёмная винтажная эстетика ==================== */
.onb{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;overflow:hidden;max-width:520px;margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 26px) 26px calc(env(safe-area-inset-bottom) + 24px);
  background:radial-gradient(125% 80% at 50% -8%, #2a2038 0%, #171320 46%, #0b0912 100%);color:#dfe1ea}
.onb::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(60% 40% at 80% 12%, rgba(180,170,210,.10), transparent 70%);}
.onb>*{position:relative;z-index:3}
.onb-deco{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.onb-deco>span{position:absolute;color:#aeb4c8;opacity:0;line-height:0}
.d-float{animation:decoIn 1.3s var(--ease) forwards, floatY 7s ease-in-out infinite}
.d-float2{animation:decoIn 1.5s var(--ease) forwards, floatY 9.5s ease-in-out infinite}
.d-tw{animation:twinkle 4s ease-in-out infinite}
@keyframes decoIn{to{opacity:.55}}

const KEY='tatonka';
const TZ=5; // Уфа UTC+5

const DEFAULT = {
  onboarded:false,
  profile:{name:'',birth:'',height:0,weight:0,goalWeight:0,sex:'f',activity:'medium',goals:[],chronotype:'',
           waterGoal:8,stepGoal:8000,sleep:'23:00',wake:'07:00',startDate:'',theme:'milk',dark:false,pin:''},

  tatoLog:[]

function load(){ try{S=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){S={}} S=deepMerge(structuredClone(DEFAULT),S); }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){toast('Мало места в памяти')} }
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])){a[k]=deepMerge(a[k]||{},b[k])}else if(b[k]!==undefined){a[k]=b[k]}}return a}

/* ==================== ДАТЫ (UTC+5) ==================== */
function now(){return new Date(Date.now()+TZ*3600e3)}
function keyOf(d){return d.toISOString().slice(0,10)}
function todayKey(){return keyOf(now())}
function fmtDate(k){const [y,m,d]=k.split('-');const M=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];return `${+d} ${M[+m-1]}`}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}
function day(k){k=k||todayKey(); if(!S.days[k])S.days[k]={}; return S.days[k]}
function lastDays(n){const out=[];const t=now();for(let i=n-1;i>=0;i--){const d=new Date(t-i*864e5);out.push(keyOf(d))}return out}

let sheetEl,scrimEl;
function openSheet(html){
  closeSheet(true);
  scrimEl=document.createElement('div');scrimEl.className='scrim';scrimEl.onclick=()=>closeSheet();
  sheetEl=document.createElement('div');sheetEl.className='sheet';
  sheetEl.innerHTML=`<div class="grab"></div>`+html;
  document.body.append(scrimEl,sheetEl);
  requestAnimationFrame(()=>{scrimEl.classList.add('show');sheetEl.classList.add('show')});
}
function closeSheet(instant){
  if(!sheetEl)return;const s=sheetEl,c=scrimEl;sheetEl=null;scrimEl=null;
  if(instant){s.remove();c&&c.remove();return}
  s.classList.remove('show');c&&c.classList.remove('show');
  setTimeout(()=>{s.remove();c&&c.remove()},380);
}

/* активность дня = хоть что-то отмечено */
function activeDay(d){if(!d)return false;return !!(d.water||d.steps||d.workout||d.weight||d.mood||d.reading||d.selfcare||d.diary||(d.sleep&&d.sleep.hours)||(d.food&&Object.keys(d.food).length))}
function streak(s){let n=0;const t=now();for(let i=0;i<400;i++){const k=keyOf(new Date(t-i*864e5));if(activeDay(s.days[k]))n++;else if(i>0)break;else{}}return n}

/* процент выполнения дня */
function completion(k){
  const d=day(k),p=S.profile,parts=[];
  parts.push(Math.min(1,(d.water||0)/(p.waterGoal||8)));
  parts.push(Math.min(1,(d.steps||0)/(p.stepGoal||8000)));
  parts.push(d.workout?1:0);
  parts.push(d.mood?1:0);
  parts.push(d.sleep&&d.sleep.hours?1:0);
  const meals=d.food?Object.values(d.food).filter(v=>v===true).length:0;
  parts.push(Math.min(1,meals/3));
  parts.push(d.reading?1:0);
  parts.push(d.selfcare?1:0);
  return Math.round(parts.reduce((a,b)=>a+b,0)/parts.length*100);
}

function checkAchievements(){
  let gained=null;

}

function flowerD(w){let p='<circle cx="12" cy="12" r="2.1"/>';for(let a=0;a<360;a+=72)p+=`<ellipse cx="12" cy="6.6" rx="1.9" ry="3.6" transform="rotate(${a} 12 12)"/>`;return svgD(p,w)}
const DECO={
  moon:'<path d="M20.5 13A8 8 0 1 1 11 3.5 6.3 6.3 0 0 0 20.5 13Z"/>',
  butterfly:'<path d="M12 6.5v10.5"/><path d="M12 8.5C9.6 4.2 3.8 4.8 4.2 9c.3 3.3 3.8 3.9 7.8 1M12 8.5c2.4-4.3 8.2-3.7 7.8.5-.3 3.3-3.8 3.9-7.8 1"/><path d="M12 6.5 10.6 4.6M12 6.5 13.4 4.6"/>',
  heart:'<path d="M12 19.5s-6.4-4.2-6.4-8.7A3.3 3.3 0 0 1 12 8.2a3.3 3.3 0 0 1 6.4 2.6c0 4.5-6.4 8.7-6.4 8.7Z"/>',
  sparkle:'<path d="M12 3c.5 4.6 1.4 5.5 6 6-4.6.5-5.5 1.4-6 6-.5-4.6-1.4-5.5-6-6 4.6-.5 5.5-1.4 6-6Z"/>'
};
function obDeco(){
  return `<div class="onb-deco">
    <span class="d-float" style="top:5%;right:7%;color:#cbcfe0">${svgD(DECO.moon,66)}</span>
    <span class="d-float2" style="top:15%;left:5%">${svgD(DECO.butterfly,42)}</span>
    <span class="d-float" style="bottom:19%;left:8%;animation-delay:.6s">${flowerD(48)}</span>
    <span class="d-float2" style="bottom:11%;right:11%;animation-delay:.3s">${svgD(DECO.heart,30)}</span>
    <span class="d-float" style="top:60%;right:6%;animation-delay:.9s">${flowerD(30)}</span>
    <span class="d-tw" style="top:33%;right:17%">${svgD(DECO.sparkle,20)}</span>
    <span class="d-tw" style="top:47%;left:11%;animation-delay:1s">${svgD(DECO.sparkle,13)}</span>
    <span class="d-tw" style="bottom:33%;right:27%;animation-delay:1.7s">${svgD(DECO.sparkle,16)}</span>
    <span class="d-tw" style="top:23%;left:42%;animation-delay:.6s">${svgD(DECO.sparkle,10)}</span>
    <span class="d-tw" style="bottom:44%;left:22%;animation-delay:2.1s">${svgD(DECO.sparkle,12)}</span>
  </div>`;
}
function setDarkStatus(){const m=document.querySelector('meta[name=theme-color]');if(m)m.content='#0b0912'}

/* ==================== ПРИВЕТСТВИЕ ==================== */

    </div>

/* ==================== ПЕРВИЧНАЯ НАСТРОЙКА ==================== */
let obStep=0, obData={goals:[]};
const GOAL_OPTS=[['lose','Похудение','🌸'],['muscle','Набор массы','💪'],['health','Здоровье','🌿'],['habits','Привычки','✦'],['beauty','Красота','🦋'],['growth','Саморазвитие','📖'],['sleep','Хороший сон','🌙'],['water','Больше воды','💧'],['energy','Энергия','⚡'],['calm','Спокойствие','🤍']];
const OB_SCREENS=[
  {t:'Как тебя зовут?',sub:'С этого начнём наше знакомство',fields:[{k:'name',type:'text',ph:'Твоё имя'}]},
  {t:'Немного о тебе',sub:'Это поможет точнее считать прогресс',fields:[{k:'birth',type:'date',label:'Дата рождения'},{k:'sex',type:'choice',label:'Пол',opts:[['f','Девушка','🌙'],['m','Парень','⭐'],['x','Не указывать','✦']]}]},
  {t:'Твои параметры',sub:'Позже всё можно изменить в профиле',fields:[{k:'height',type:'num',label:'Рост, см',ph:'170'},{k:'weight',type:'num',label:'Вес сейчас, кг',ph:'65'},{k:'goalWeight',type:'num',label:'Желаемый вес, кг',ph:'60'}]},
  {t:'Насколько ты активна?',sub:'',fields:[{k:'activity',type:'choice',opts:[['low','Спокойный ритм','🌿','Больше сижу'],['medium','Средний','⚡','Иногда двигаюсь'],['high','Энергичный','🔥','Часто спорт']]}]},
  {t:'Что для тебя важно?',sub:'Выбери одну или несколько целей',fields:[{k:'goals',type:'multi',opts:GOAL_OPTS}]},
  {t:'Сова или жаворонок?',sub:'Настроим ритм под тебя',fields:[{k:'chronotype',type:'choice',opts:[['lark','Жаворонок','🌅','Люблю раннее утро'],['owl','Сова','🌙','Оживаю вечером'],['mix','Как получится','🌗','По-разному']]}]},
  {t:'Дневные нормы',sub:'Ориентиры на каждый день',fields:[{k:'waterGoal',type:'num',label:'Вода, стаканов',ph:'8',def:8},{k:'stepGoal',type:'num',label:'Шаги',ph:'8000',def:8000}]},
  {t:'Твой режим сна',sub:'Чтобы напоминать бережно',fields:[{k:'sleep',type:'time',label:'Ложусь',def:'23:00'},{k:'wake',type:'time',label:'Встаю',def:'07:00'}]},
  {type:'outro'}
];
function htmlType(t){return t==='num'?'number':t==='date'?'date':t==='time'?'time':'text'}
function renderField(f,i){
  const delay=`style="animation-delay:${i*80}ms"`;
  if(f.type==='multi'){
    const cur=obData[f.k]||[];
    return `<div class="ofield" ${delay}><div class="ogrid">${f.opts.map((o,j)=>`<button class="opick ${cur.includes(o[0])?'on':''}" data-action="ob-multi" data-k="${f.k}" data-v="${o[0]}" style="animation-delay:${j*45}ms"><span class="oem">${o[2]}</span><b>${o[1]}</b></button>`).join('')}</div></div>`;
  }
  if(f.type==='choice'){
    const cur=obData[f.k];
    return `<div class="ofield" ${delay}>${f.label?`<label>${f.label}</label>`:''}<div class="ocards">${f.opts.map((o,j)=>`<button class="ocard ${cur===o[0]?'on':''}" data-action="ob-pick" data-k="${f.k}" data-v="${o[0]}" style="animation-delay:${j*70}ms"><span class="oem">${o[2]||''}</span><span class="oct"><b>${o[1]}</b>${o[3]?`<span>${o[3]}</span>`:''}</span></button>`).join('')}</div></div>`;
  }
  const v=obData[f.k]??f.def??'';
  return `<div class="ofield" ${delay}>${f.label?`<label>${f.label}</label>`:''}<input class="oinp" id="obf-${f.k}" type="${htmlType(f.type)}" placeholder="${f.ph||''}" value="${v}" ${f.type==='num'?'inputmode="numeric"':''}></div>`;
}
function captureFromDOM(){document.querySelectorAll('.onb .oinp').forEach(el=>{const k=el.id.replace('obf-','');let v=el.value;if(el.type==='number')v=v===''?'':parseFloat(v);obData[k]=v})}
function renderOnboard(){
  setDarkStatus();
  const sc=OB_SCREENS[obStep];
  const dots=OB_SCREENS.map((_,i)=>`<i class="${i===obStep?'cur':i<obStep?'done':''}"></i>`).join('');
  let body;
  if(sc.type==='outro'){
    body=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center" class="screen">
      <div class="silver" style="font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:700">всё готово</div>
      <div class="onb-logo" style="font-size:32px;margin:14px 0 4px">${obData.name||'красотка'}, добро пожаловать</div>
      <div class="hair"></div>
      <p class="osub" style="text-align:center;margin-top:12px">Твоё пространство собрано. Загляни каждый день — маленькие шаги творят большое.</p>
      <div style="font-size:26px;letter-spacing:6px;margin-top:10px">🌙 ✦ 🦋 ✦ 🤍</div>
    </div>
    <button class="obtn" data-action="ob-finish">Открыть TaToNkA</button>`;
  }else{
    body=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center" class="screen">
      <h2>${sc.t}</h2>${sc.sub?`<p class="osub">${sc.sub}</p>`:''}
      ${sc.fields.map((f,i)=>renderField(f,i)).join('')}
    </div>
    <div class="onav">
      ${obStep>0?`<button class="obtn ghost" data-action="ob-back" style="flex:0 0 56px">←</button>`:''}
      <button class="obtn" data-action="ob-next" style="flex:1">Далее ✦</button>
    </div>`;
  }
  app().innerHTML=`<div class="onb">${obDeco()}<div class="odots">${dots}</div>${body}</div>`;
  const first=document.querySelector('.onb .oinp');if(first)setTimeout(()=>{try{first.focus()}catch(e){}},260);
}
function obNext(){
  const sc=OB_SCREENS[obStep];
  captureFromDOM();
  if(sc.fields){
    for(const f of sc.fields){
      if(f.k==='name'&&!(obData.name&&String(obData.name).trim())){toast('Как тебя зовут? 🌙');return}
      if(f.def!==undefined&&(obData[f.k]===''||obData[f.k]===undefined))obData[f.k]=f.def;
    }
  }
  if(obStep<OB_SCREENS.length-1){obStep++;renderOnboard()}else finishOnboard();
}
function finishOnboard(){
  captureFromDOM();
  Object.assign(S.profile,obData);
  if(!Array.isArray(S.profile.goals))S.profile.goals=[];
  S.profile.startDate=todayKey();
  S.onboarded=true;
  save();
  applyTheme();
  go('home');
  setTimeout(()=>toast('Добро пожаловать, '+(S.profile.name||'')+'! 🌸'),400);
}

/* ==================== РОУТЕР + ОБОЛОЧКА ==================== */
let screen='home';
const NAV=[['home','Главная','home'],['challenges','Челленджи','challenge'],['stats','Статистика','stats'],['tato','TaTo','tato'],['profile','Профиль','profile']];
function go(s){screen=s;render()}
function shell(inner,extra=''){
  return `<div id="main">${inner}</div>
  ${extra}
  <div class="nav"><div class="navbar">${NAV.map(n=>`<button class="navb ${screen===n[0]?'on':''}" data-action="go" data-s="${n[0]}">${svg(n[2],23)}<span>${n[1]}</span></button>`).join('')}</div></div>`;
}
function render(){
  if(!S.onboarded){renderWelcome();return}
  if(screen==='home')renderHome();
  else if(screen==='challenges')renderChallenges();
  else if(screen==='stats')renderStats();
  else if(screen==='tato')renderTato();
  else if(screen==='profile')renderProfile();
}

/* ==================== ГЛАВНАЯ ==================== */
const CARDS=[
  ['water','Вода','t-water'],['steps','Шаги','t-steps'],['workout','Тренировка','t-workout'],
  ['food','Питание','t-food'],['weight','Вес','t-weight'],['mood','Настроение','t-mood'],
  ['sleep','Сон','t-sleep'],['photo','Фото','t-photo'],['read','Чтение','t-read'],
  ['care','Уход','t-care'],['diary','Дневник','t-diary']
];
function cardVal(id){
  const d=day(),p=S.profile;
  switch(id){
    case 'water':return `${d.water||0}/${p.waterGoal} стак.`;
    case 'steps':return `${(d.steps||0).toLocaleString('ru')}/${p.stepGoal.toLocaleString('ru')}`;
    case 'workout':return d.workout?'Готово ✓':'Не отмечено';
    case 'food':{const m=d.food?Object.values(d.food).filter(v=>v===true).length:0;return `${m}/3 приёма`}
    case 'weight':return d.weight?d.weight+' кг':(p.weight?p.weight+' кг':'—');
    case 'mood':return d.mood||'Как ты?';
    case 'sleep':return d.sleep&&d.sleep.hours?d.sleep.hours+' ч':'—';
    case 'photo':{const t=S.photos.filter(ph=>ph.date===todayKey()).length;return t?t+' сегодня':S.photos.length+' всего'}
    case 'read':return d.reading?(d.readMin?d.readMin+' мин':'Готово ✓'):'—';
    case 'care':return d.selfcare?'Готово ✓':'—';
    case 'diary':return d.diary?'Записано ✓':'Пусто';
  }
}
function isDone(id){const d=day();return ({workout:d.workout,read:d.reading,care:d.selfcare,mood:!!d.mood,diary:!!(d.diary&&d.diary.length>2),water:(d.water||0)>=S.profile.waterGoal,steps:(d.steps||0)>=S.profile.stepGoal})[id]}
function greeting(){const h=now().getHours();return h<6?'Доброй ночи':h<12?'Доброе утро':h<18?'Добрый день':'Добрый вечер'}
function renderHome(){
  const pct=completion();const R=88,C=2*Math.PI*R,off=C*(1-pct/100);
  const dayN=S.profile.startDate?daysBetween(S.profile.startDate,todayKey())+1:1;
  const str=streak(S);
  const cardsHtml=CARDS.map((c,i)=>`<button class="tile ${c[2]} ${isDone(c[0])?'done':''}" data-action="card" data-id="${c[0]}" style="animation-delay:${i*40}ms">
    <div class="ic">${svg(c[0]==='care'?'care':c[0]==='read'?'read':c[0]==='food'?'food':c[0],22)}</div>
    <div><div class="lbl">${c[1]}</div><div class="val">${cardVal(c[0])}</div></div>
  </button>`).join('');
  app().innerHTML=shell(`
    <div class="head"><div>
      <h1>${greeting()},</h1><div class="greet" style="text-align:left;font-size:24px">${S.profile.name||'красотка'} 🌸</div>
    </div><button class="iconbtn" data-action="go" data-s="profile">${svg('gear',22)}</button></div>

    <div class="hero screen">
      <div class="ringwrap">
        <div class="ringglow"></div>
        <svg width="210" height="210">
          <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--border)" stroke-width="14"/>
          <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="hsl(var(--accent-h) 70% var(--ring-l))"/>
            <stop offset="50%" stop-color="hsl(var(--lav-h) 55% var(--ring-l))"/>
            <stop offset="100%" stop-color="hsl(var(--sage-h) 45% var(--ring-l))"/>
          </linearGradient></defs>
          <circle cx="105" cy="105" r="${R}" fill="none" stroke="url(#rg)" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C}" style="transition:stroke-dashoffset 1.1s var(--ease)" id="ringc"/>
        </svg>
        <div class="ringtext"><div class="pct">${pct}%</div><div class="day">День ${dayN} · выполнено</div></div>
      </div>
    </div>

    <div class="summary screen">
      <div class="s"><b>${str}</b><span>🔥 дней подряд</span></div>
      <div class="s"><b>${S.challenges.filter(c=>c.active!==false).length}</b><span>🎯 челленджей</span></div>
      <div class="s"><b>${S.achievements.length}</b><span>🏆 наград</span></div>
    </div>

    <div class="section-t">Сегодня</div>
    <div class="grid">${cardsHtml}</div>
  `);
  setTimeout(()=>{const rc=$('#ringc');if(rc)rc.style.strokeDashoffset=off},60);
}

/* ==================== ЭКРАНЫ КАРТОЧЕК ==================== */
function refreshHome(){checkAchievements();save();if(screen==='home')renderHome()}

function openCard(id){({water:cardWater,steps:cardSteps,workout:cardWorkout,food:cardFood,weight:cardWeight,mood:cardMood,sleep:cardSleep,photo:cardPhoto,read:cardRead,care:cardCare,diary:cardDiary}[id])()}

/* --- Вода --- */
function cardWater(){const d=day(),g=S.profile.waterGoal;const pct=Math.min(100,Math.round((d.water||0)/g*100));
  openSheet(`<h2>💧 Вода</h2><p class="desc">1 стакан ≈ 250 мл</p>
    <div class="counter"><button class="cbtn" data-action="water-" >−</button>
      <div class="cval" id="wv">${d.water||0}<small>из ${g} · ${((d.water||0)*0.25).toFixed(2)} л</small></div>
      <button class="cbtn" data-action="water+">+</button></div>
    <div class="bar" style="margin:16px 2px"><i id="wb" style="width:${pct}%"></i></div>
    <div class="pillrow" style="justify-content:center;margin-top:8px">
      <button class="chip" data-action="water-add" data-n="1">+1</button>
      <button class="chip" data-action="water-add" data-n="2">+2</button>
      <button class="chip" data-action="water-add" data-n="4">+4</button></div>
    <button class="btn" data-action="closex" style="margin-top:24px">Готово</button>`);
}
function waterAdd(n){const d=day();d.water=Math.max(0,(d.water||0)+n);save();
  const g=S.profile.waterGoal;const wv=$('#wv');if(wv)wv.innerHTML=`${d.water}<small>из ${g} · ${(d.water*0.25).toFixed(2)} л</small>`;
  const wb=$('#wb');if(wb)wb.style.width=Math.min(100,d.water/g*100)+'%';
  if(d.water===g)toast('Норма воды выполнена! 💦');checkAchievements();if(screen==='home')renderHome()}

/* --- Шаги --- */

/* --- Питание --- */

/* --- Вес --- */
function cardWeight(){const d=day();const hist=lastDays(60).filter(k=>S.days[k]&&S.days[k].weight).map(k=>({k,v:S.days[k].weight}));
  const cur=d.weight||S.profile.weight,goal=S.profile.goalWeight;
  openSheet(`<h2>⚖️ Вес</h2><p class="desc">${goal?`Цель: ${goal} кг · ${cur?(cur>goal?'осталось '+(cur-goal).toFixed(1)+' кг':cur<goal?'нужно +'+(goal-cur).toFixed(1)+' кг':'ты у цели! 🎉'):''}`:''}</p>
    <div class="field"><label>Вес сегодня, кг</label>
      <input class="inp" id="wgin" type="number" inputmode="decimal" value="${d.weight||''}" placeholder="${S.profile.weight||'65'}" style="font-size:24px;padding:18px;text-align:center"></div>

/* ==================== ГРАФИКИ (SVG, офлайн) ==================== */
function lineChart(vals,labels,unit){
  if(!vals.length)return '';const W=280,H=110,pad=6;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>{const x=pad+i*(W-2*pad)/Math.max(1,vals.length-1);const y=H-pad-((v-mn)/rng)*(H-2*pad-14);return [x,y]});
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=path+` L${pts[pts.length-1][0].toFixed(1)} ${H} L${pts[0][0].toFixed(1)} ${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="hsl(var(--accent-h) var(--accent-s) var(--accent-l))" stop-opacity=".35"/><stop offset="100%" stop-color="hsl(var(--accent-h) var(--accent-s) var(--accent-l))" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${path}" fill="none" stroke="hsl(var(--accent-h) var(--accent-s) var(--accent-l))" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="hsl(var(--accent-h) var(--accent-s) var(--accent-ink-l))"/>`).join('')}
    <text x="${pts[0][0]}" y="${H-1}" font-size="8" fill="var(--muted)">${labels[0]}</text>
    <text x="${W-2}" y="${H-1}" font-size="8" fill="var(--muted)" text-anchor="end">${labels[labels.length-1]}</text>
    <text x="2" y="9" font-size="8" fill="var(--muted)">${mx}${unit||''}</text>
  </svg>`;
}
function barChart(vals,labels){
  if(!vals.length)return '';const W=280,H=110,pad=6,mx=Math.max(...vals,1),bw=(W-2*pad)/vals.length;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    ${vals.map((v,i)=>{const h=(v/mx)*(H-2*pad-12);const x=pad+i*bw;return `<rect x="${(x+bw*0.15).toFixed(1)}" y="${(H-pad-h).toFixed(1)}" width="${(bw*0.7).toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="hsl(var(--accent-h) var(--accent-s) var(--accent-l))"/>`}).join('')}
    <text x="${pad}" y="${H-1}" font-size="8" fill="var(--muted)">${labels[0]}</text>
    <text x="${W-2}" y="${H-1}" font-size="8" fill="var(--muted)" text-anchor="end">${labels[labels.length-1]}</text>
  </svg>`;
}
function heatmap(){
  const days=lastDays(91);const cells=days.map(k=>{const p=S.days[k]?completion(k):-1;return {k,p}});
  return `<div style="display:grid;grid-template-columns:repeat(13,1fr);gap:4px">${cells.map(c=>{
    let bg='var(--border)';if(c.p>=0){const l=c.p===0?90:88-c.p*0.5;bg=`hsl(var(--accent-h) var(--accent-s) ${l}%)`;if(c.p>=100)bg='hsl(var(--accent-h) var(--accent-s) var(--accent-l))'}
    return `<div title="${fmtDate(c.k)}: ${c.p<0?'—':c.p+'%'}" style="aspect-ratio:1;border-radius:5px;background:${bg}"></div>`}).join('')}</div>`;
}

/* ==================== ЧЕЛЛЕНДЖИ ==================== */
function chDay(c){return Math.min(c.days,daysBetween(c.start,todayKey())+1)}
function chProgress(c){let done=0,total=0;const upto=chDay(c);for(let i=0;i<upto;i++){const k=keyOf(new Date(new Date(c.start).getTime()+i*864e5));const pr=c.progress&&c.progress[k]||{};c.tasks.forEach((_,ti)=>{total++;if(pr[ti])done++})}return{done,total,pct:total?Math.round(done/total*100):0}}

function startChallenge(k){const def=CHALLENGES.find(c=>c.k===k);if(S.challenges.some(c=>c.k===k&&c.active!==false)){toast('Этот челлендж уже идёт');return}

function openChallenge(id){const c=S.challenges.find(x=>x.id==id);if(!c)return;const dn=chDay(c),k=todayKey();c.progress=c.progress||{};c.progress[k]=c.progress[k]||{};const pr=chProgress(c);

/* ==================== TaTo — ПОМОЩНИК ==================== */
const TATO_MSGS={
  morning:['Доброе утро! Стакан воды перед делами — и день пойдёт легче 💧','Новый день — новый шанс стать чуть лучше вчерашней себя 🌅','Улыбнись себе в зеркало. Ты уже молодец, что здесь ✨'],
  evening:['Как прошёл день? Загляни в дневник, пока мысли свежие 📖','Вечер — время для себя. Ты заслужила отдых 🤍','Не забудь лечь вовремя, сон — это твоя суперсила 😴'],
  day:['Ты справляешься лучше, чем думаешь 💪','Маленький шаг сегодня — большой результат через 75 дней 🔥','Вода выпита? Организм скажет спасибо 💧','Секрет прогресса — постоянство, а не идеальность 🌸'],
  praise:['Огонь! Ты держишь ритм 🔥','Горжусь тобой — так держать! 💖','Дисциплина в деле. Ты крутая 👑']
};
function tatoReply(){const h=now().getHours();const pool=h<11?TATO_MSGS.morning:h>=20?TATO_MSGS.evening:(streak(S)>=3?TATO_MSGS.praise:TATO_MSGS.day);return pool[Math.floor(Math.random()*pool.length)]}
function renderTato(){
  const log=S.tatoLog.length?S.tatoLog:[{r:'tato',t:`Привет, ${S.profile.name||'солнышко'}! Я TaTo — твой помощник 🌸 Пиши что угодно: мотивация, совет или просто поболтать.`}];
  const ai=S.settings.ai.key?'':'';
  app().innerHTML=shell(`
    <div class="head"><div><h1>TaTo</h1><div class="sub">${S.settings.ai.key?'ИИ подключён ✓':'мотивация и поддержка'}</div></div>
      <button class="iconbtn" data-action="tato-settings">${svg('gear',22)}</button></div>
    <div class="chat" id="chat">${log.map(m=>`<div class="msg ${m.r}">${m.t}</div>`).join('')}</div>
  `,`<div class="chatbar"><input id="tatoin" placeholder="Напиши TaTo…" autocomplete="off"><button class="send bg-accent" data-action="tato-send" style="color:#3a2530">${svg('send',22)}</button></div>`);
  const inp=$('#tatoin');if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')tatoSend()});
  const c=$('#chat');if(c&&c.scrollIntoView)try{c.scrollIntoView(false)}catch(e){}
  try{window.scrollTo(0,document.body.scrollHeight)}catch(e){}
}
async function tatoSend(){const inp=$('#tatoin');if(!inp)return;const t=inp.value.trim();if(!t)return;inp.value='';
  S.tatoLog.push({r:'me',t});save();renderTato();
  const ai=S.settings.ai;
  if(ai.key&&ai.endpoint){
    S.tatoLog.push({r:'tato',t:'…'});renderTato();
    try{
      const res=await fetch(ai.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.key},
        body:JSON.stringify({model:ai.model,messages:[{role:'system',content:'Ты TaTo — тёплый женский помощник в приложении для здоровья и привычек TaToNkA. Отвечай коротко, по-русски, с заботой и лёгкой мотивацией.'},...S.tatoLog.filter(m=>m.t!=='…').slice(-8).map(m=>({role:m.r==='me'?'user':'assistant',content:m.t}))]})});
      const data=await res.json();const reply=data.choices?.[0]?.message?.content||data.content?.[0]?.text||'Что-то пошло не так с ИИ 😅';
      S.tatoLog=S.tatoLog.filter(m=>m.t!=='…');S.tatoLog.push({r:'tato',t:reply});
    }catch(e){S.tatoLog=S.tatoLog.filter(m=>m.t!=='…');S.tatoLog.push({r:'tato',t:'Не получилось связаться с ИИ. Проверь ключ в настройках. А пока: '+tatoReply()})}
    save();renderTato();
  }else{
    setTimeout(()=>{S.tatoLog.push({r:'tato',t:tatoReply()});save();renderTato()},400);
  }
}
function tatoSettings(){const ai=S.settings.ai;
  openSheet(`<h2>Подключить ИИ</h2><p class="desc">Вставь API-ключ (OpenAI или совместимый) — и TaTo станет настоящим ИИ. Без ключа работают готовые мотивации.</p>

/* ==================== ПРОФИЛЬ ==================== */
const THEMES=[['milk','Milk','#f3ddd9'],['sakura','Sakura','#f6c4d3'],['lavender','Lavender','#d4c8f0'],['peach','Peach','#f7c5a6'],['sage','Sage','#bdd3b4'],['mocha','Mocha','#8a6a52'],['night','Night','#4a3f6b'],['sunset','Sunset','#c96a4f']];
function ageFrom(b){if(!b)return '';const t=new Date();const d=new Date(b);let a=t.getFullYear()-d.getFullYear();if(t<new Date(t.getFullYear(),d.getMonth(),d.getDate()))a--;return a?a+' лет':''}

function editProfile(){const p=S.profile;

function doExport(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='tatonka-backup-'+todayKey()+'.json';a.click();URL.revokeObjectURL(u);toast('Копия сохранена 💾')}
function doImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const obj=JSON.parse(r.result);S=deepMerge(structuredClone(DEFAULT),obj);save();applyTheme();toast('Данные восстановлены ✓');go('home')}catch(err){toast('Не удалось прочитать файл')}};r.readAsText(f)}
function exportPDF(){
  const w=window.open('','_blank');const p=S.profile;
  const rows=lastDays(14).map(k=>{const d=S.days[k]||{};return `<tr><td>${fmtDate(k)}</td><td>${d.water||0}</td><td>${d.steps||0}</td><td>${d.weight||''}</td><td>${d.sleep&&d.sleep.hours||''}</td><td>${d.mood||''}</td><td>${completion(k)}%</td></tr>`}).join('');
  w.document.write(`<html><head><title>TaToNkA — статистика</title><style>body{font-family:sans-serif;padding:24px;color:#333}h1{color:#c0506e}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #eee;padding:8px;text-align:center;font-size:13px}th{background:#f7e8ee}</style></head>

  w.document.close();

/* ==================== ОБРАБОТЧИК ДЕЙСТВИЙ ==================== */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action,D=el.dataset;haptic();
  const d=day();
  switch(a){
    /* онбординг */
    case 'ob-start':obStep=0;obData={goals:[]};renderOnboard();break;
    case 'ob-next':obNext();break;
    case 'ob-back':obStep--;renderOnboard();break;
    case 'ob-pick':captureFromDOM();obData[D.k]=D.v;renderOnboard();break;
    case 'ob-multi':{captureFromDOM();const arr=obData[D.k]||[];const i=arr.indexOf(D.v);i<0?arr.push(D.v):arr.splice(i,1);obData[D.k]=arr;renderOnboard();break}
    case 'ob-finish':finishOnboard();break;
    /* навигация */
    case 'go':go(D.s);break;
    case 'card':openCard(D.id);break;
    case 'closex':closeSheet();break;
    /* вода */
    case 'water+':waterAdd(1);break;
    case 'water-':waterAdd(-1);break;
    case 'water-add':waterAdd(+D.n);break;
    /* шаги */
    case 'steps-set':$('#stin').value=D.n;break;
    case 'steps-save':d.steps=parseInt($('#stin').value)||0;refreshHome();closeSheet();toast('Шаги сохранены 👟');break;
    /* тренировка */
    case 'toggle-workout':el.classList.toggle('on');break;
    case 'workout-save':d.workout=$('.sheet .check').classList.contains('on');d.workoutNote=$('#wknote').value;d.workoutMin=parseInt($('#wkmin').value)||0;refreshHome();closeSheet();toast(d.workout?'Тренировка отмечена 💪':'Сохранено');break;
    /* питание */
    case 'toggle-meal':el.classList.toggle('on');break;
    case 'food-save':{d.food=d.food||{};$$('.sheet [data-action=toggle-meal]').forEach(b=>d.food[b.dataset.m]=b.classList.contains('on'));d.food.calories=parseInt($('#kcal').value)||0;refreshHome();closeSheet();toast('Питание сохранено 🥗');break}
    /* вес */
    case 'weight-save':{const v=parseFloat($('#wgin').value);if(v){d.weight=v;S.profile.weight=v}refreshHome();closeSheet();toast('Вес записан ⚖️');break}
    /* настроение */
    case 'mood-set':d.mood=D.m;$$('.sheet .moods button').forEach(b=>b.classList.toggle('on',b.dataset.m===D.m));save();break;
    case 'mood-save':d.moodNote=$('#mnote').value;refreshHome();closeSheet();toast('Настроение сохранено 💛');break;
    /* сон */
    case 'sleep-save':{const b=$('#slbed').value,wk=$('#slwake').value;d.sleep={bed:b,wake:wk,hours:sleepHours(b,wk)};refreshHome();closeSheet();toast('Сон записан 😴');break}
    /* чтение */
    case 'toggle-read':el.classList.toggle('on');break;
    case 'read-save':d.reading=$('.sheet .check').classList.contains('on');d.readMin=parseInt($('#rdmin').value)||0;refreshHome();closeSheet();toast('Сохранено 📚');break;
    /* уход */
    case 'toggle-care':el.classList.toggle('on');break;
    case 'care-save':{d.careList=d.careList||{};$$('.sheet [data-action=toggle-care]').forEach(b=>d.careList[b.dataset.c]=b.classList.contains('on'));d.selfcare=Object.values(d.careList).some(Boolean);refreshHome();closeSheet();toast('Забота о себе 🤍');break}
    /* дневник */
    case 'diary-save':d.diary=$('#dtext').value;refreshHome();closeSheet();toast('Запись сохранена 📖');break;
    /* фото */
    case 'photo-take':$('#phin').click();break;
    case 'photo-compare':photoCompare();break;
    case 'photo-view':photoView(D.id);break;
    case 'photo-del':S.photos=S.photos.filter(p=>p.id!=D.id);save();toast('Фото удалено');cardPhoto();break;
    /* челленджи */
    case 'ch-start':startChallenge(D.k);break;
    case 'ch-open':openChallenge(D.id);break;
    case 'ch-custom':chCustom();break;
    case 'ch-task':{const c=S.challenges.find(x=>x.id==D.id);const k=todayKey();c.progress[k]=c.progress[k]||{};c.progress[k][D.i]=!c.progress[k][D.i];save();el.classList.toggle('on');checkAchievements();break}
    case 'ch-drop':{if(confirm('Завершить этот челлендж?')){const c=S.challenges.find(x=>x.id==D.id);c.active=false;save();closeSheet();renderChallenges();toast('Челлендж завершён')}break}
    case 'cc-save':{const name=$('#cc-name').value.trim();if(!name){toast('Введи название');break}const tasks=$('#cc-tasks').value.split('\n').map(x=>x.trim()).filter(Boolean);if(!tasks.length){toast('Добавь хотя бы одну задачу');break}
      S.challenges.push({id:Date.now(),k:'custom'+Date.now(),t:name,em:$('#cc-em').value||'⭐',days:parseInt($('#cc-days').value)||30,tasks,start:todayKey(),progress:{},active:true});save();checkAchievements();closeSheet();renderChallenges();toast('Челлендж создан! 🎯');break}
    /* TaTo */
    case 'tato-send':tatoSend();break;
    case 'tato-settings':tatoSettings();break;
    case 'ai-save':S.settings.ai={endpoint:$('#ai-ep').value.trim(),key:$('#ai-key').value.trim(),model:$('#ai-model').value.trim()||'gpt-4o-mini'};save();closeSheet();renderTato();toast(S.settings.ai.key?'ИИ подключён ✓':'Сохранено');break;
    /* профиль */
    case 'toggle-dark':S.profile.dark=!S.profile.dark;save();applyTheme();renderProfile();break;
    case 'set-theme':S.profile.theme=D.t;save();applyTheme();renderProfile();break;
    case 'edit-profile':editProfile();break;
    case 'ep-save':Object.assign(S.profile,{name:$('#ep-name').value,birth:$('#ep-birth').value,height:+$('#ep-h').value||0,weight:+$('#ep-w').value||0,goalWeight:+$('#ep-gw').value||0});save();closeSheet();renderProfile();toast('Сохранено ✓');break;
    case 'edit-goals':editGoals();break;
    case 'eg-save':Object.assign(S.profile,{waterGoal:+$('#eg-water').value||8,stepGoal:+$('#eg-steps').value||8000,sleep:$('#eg-sleep').value,wake:$('#eg-wake').value});save();closeSheet();renderProfile();toast('Цели обновлены 🎯');break;
    case 'toggle-rem':toggleReminder(D.r);renderProfile();break;
    case 'set-pin':setPin();break;
    case 'export':doExport();break;
    case 'import':$('#impin').click();break;
    case 'export-pdf':exportPDF();break;
    case 'reset':if(confirm('Точно удалить ВСЕ данные? Отменить нельзя.')){localStorage.removeItem(KEY);location.reload()}break;
  }
});
function $$(s){return Array.from(document.querySelectorAll(s))}

/* ==================== НАПОМИНАНИЯ ==================== */
function toggleReminder(r){
  if(!S.settings.reminders[r]){
    if('Notification' in window && Notification.permission!=='granted'){Notification.requestPermission().then(p=>{if(p!=='granted')toast('Разреши уведомления в браузере')})}
  }
  S.settings.reminders[r]=!S.settings.reminders[r];save();scheduleReminders();
}
let remTimers=[];
function scheduleReminders(){
  remTimers.forEach(t=>clearTimeout(t));remTimers=[];
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const texts={water:'💧 Время попить воды!',workout:'🏋️‍♀️ Не забудь про тренировку',sleep:'😴 Пора готовиться ко сну',read:'📚 Немного почитать?',diary:'📖 Запиши, как прошёл день'};
  const times={water:[11,15,19],workout:[18],sleep:[22],read:[20],diary:[21]};
  Object.keys(S.settings.reminders).forEach(r=>{
    if(!S.settings.reminders[r]||!times[r])return;
    times[r].forEach(hr=>{
      const n=now();const target=new Date(n);target.setHours(hr,0,0,0);let ms=target-n;if(ms<0)ms+=864e5;
      if(ms<86400e3)remTimers.push(setTimeout(()=>{try{new Notification('TaToNkA',{body:texts[r]})}catch(e){}scheduleReminders()},ms));
    });
  });
}

/* ==================== PIN-КОД ==================== */
function setPin(){
  openSheet(`<h2>PIN-код</h2><p class="desc">4 цифры для входа в приложение</p>
    <input class="inp" id="pinin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" style="text-align:center;font-size:32px;letter-spacing:12px">
    ${S.profile.pin?`<button class="btn ghost" data-action="pin-off" style="margin-top:12px">Отключить PIN</button>`:''}
    <button class="btn" data-action="pin-save" style="margin-top:12px">Сохранить</button>`);
  document.addEventListener('click',pinHandler);
}
function pinHandler(e){const el=e.target.closest('[data-action]');if(!el)return;
  if(el.dataset.action==='pin-save'){const v=$('#pinin').value;if(v.length===4){S.profile.pin=v;save();closeSheet();renderProfile();toast('PIN установлен 🔒')}else toast('Нужно 4 цифры');document.removeEventListener('click',pinHandler)}
  if(el.dataset.action==='pin-off'){S.profile.pin='';save();closeSheet();renderProfile();toast('PIN отключён');document.removeEventListener('click',pinHandler)}
}
function lockScreen(){
  app().innerHTML=`<div class="ob" style="justify-content:center;align-items:center;text-align:center">
    <div class="mark" style="margin-bottom:24px">${svg('lock',40).replace('currentColor','#fff')}</div>
    <h1 style="font-size:22px">Введи PIN</h1>
    <input class="inp" id="lockin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" style="text-align:center;font-size:34px;letter-spacing:14px;max-width:220px;margin:20px auto">
    <p class="sub" id="lockerr"></p></div>`;
  const inp=$('#lockin');inp.focus();
  inp.addEventListener('input',()=>{if(inp.value.length===4){if(inp.value===S.profile.pin){boot(true)}else{$('#lockerr').textContent='Неверный PIN';inp.value='';navigator.vibrate&&navigator.vibrate(60)}}});
}

/* ==================== МАНИФЕСТ (single-file PWA) ==================== */
function installManifest(){
  const icon="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f2a9bd"/><stop offset="0.5" stop-color="#c9b8ec"/><stop offset="1" stop-color="#a9cba3"/></linearGradient></defs><rect width="512" height="512" rx="120" fill="url(#g)"/><path d="M150 180h212M256 180v150M256 330c64 0 84-42 84-84" fill="none" stroke="#fff" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/><circle cx="360" cy="212" r="30" fill="#fff"/></svg>`);
  const mani={name:'TaToNkA',short_name:'TaToNkA',start_url:'.',scope:'.',display:'standalone',background_color:'#faf6f0',theme_color:'#f6d7de',
    icons:[{src:icon,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'},{src:icon,sizes:'192x192',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(mani)],{type:'application/manifest+json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.append(link);
  let al=document.createElement('link');al.rel='apple-touch-icon';al.href=icon;document.head.append(al);
}

/* ==================== ЗАПУСК ==================== */
function boot(unlocked){
  applyTheme();
  if(S.onboarded && S.profile.pin && !unlocked){lockScreen();return}
  render();
  scheduleReminders();
}
function init(){
  load();
  installManifest();
  applyTheme();
  boot(false);
}
init();
</script>
